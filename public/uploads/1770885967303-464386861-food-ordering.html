<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite - Food Ordering</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            padding: 10px;
            background: #667eea;
            color: white;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .cart-icon:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }

        .menu-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .categories {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .category-btn:hover,
        .category-btn.active {
            background: #667eea;
            color: white;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .menu-item {
            border: 2px solid #eee;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            background: white;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .item-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .item-details {
            padding: 15px;
        }

        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .item-description {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-price {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .add-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .cart-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: #667eea;
            font-size: 14px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .qty-btn:hover {
            background: #667eea;
            color: white;
        }

        .quantity {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .cart-summary {
            padding: 20px 0;
            border-top: 2px solid #eee;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .summary-row.total {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid #eee;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .checkout-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-cart-icon {
            font-size: 60px;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-icon {
            font-size: 80px;
            margin-bottom: 20px;
            color: #4caf50;
        }

        .modal-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .modal-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .modal-btn {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            background: #764ba2;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .cart-section {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i data-lucide="utensils-crossed"></i>
                QuickBite
            </div>
            <div class="cart-icon" onclick="scrollToCart()">
                <i data-lucide="shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </header>

        <div class="main-content">
            <div class="menu-section">
                <h2 class="section-title">
                    <i data-lucide="chef-hat"></i>
                    Our Menu
                </h2>

                <div class="categories">
                    <button class="category-btn active" onclick="filterCategory('all')">All Items</button>
                    <button class="category-btn" onclick="filterCategory('pizza')">Pizza</button>
                    <button class="category-btn" onclick="filterCategory('burger')">Burgers</button>
                    <button class="category-btn" onclick="filterCategory('pasta')">Pasta</button>
                    <button class="category-btn" onclick="filterCategory('dessert')">Desserts</button>
                    <button class="category-btn" onclick="filterCategory('drinks')">Drinks</button>
                </div>

                <div class="menu-grid" id="menuGrid"></div>
            </div>

            <div class="cart-section" id="cartSection">
                <h2 class="section-title">
                    <i data-lucide="shopping-bag"></i>
                    Your Cart
                </h2>

                <div class="cart-items" id="cartItems">
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p>Your cart is empty</p>
                    </div>
                </div>

                <div class="cart-summary" id="cartSummary" style="display: none;">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee:</span>
                        <span id="deliveryFee">$3.99</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">$0.00</span>
                    </div>
                </div>

                <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">✓</div>
            <h3 class="modal-title">Order Placed Successfully!</h3>
            <p class="modal-message">
                Your order has been confirmed and will be delivered in 30-45 minutes.<br>
                Order ID: #<span id="orderId"></span>
            </p>
            <button class="modal-btn" onclick="closeModal()">Continue Shopping</button>
        </div>
    </div>

    <script>
        const menuItems = [
            {
                id: 1,
                name: 'Margherita Pizza',
                category: 'pizza',
                price: 12.99,
                description: 'Classic tomato sauce, fresh mozzarella, and basil',
                emoji: '🍕'
            },
            {
                id: 2,
                name: 'Pepperoni Pizza',
                category: 'pizza',
                price: 14.99,
                description: 'Loaded with pepperoni and extra cheese',
                emoji: '🍕'
            },
            {
                id: 3,
                name: 'Classic Burger',
                category: 'burger',
                price: 9.99,
                description: 'Beef patty, lettuce, tomato, cheese, and special sauce',
                emoji: '🍔'
            },
            {
                id: 4,
                name: 'Chicken Burger',
                category: 'burger',
                price: 10.99,
                description: 'Crispy chicken, lettuce, and mayo',
                emoji: '🍔'
            },
            {
                id: 5,
                name: 'Spaghetti Carbonara',
                category: 'pasta',
                price: 13.99,
                description: 'Creamy pasta with bacon and parmesan',
                emoji: '🍝'
            },
            {
                id: 6,
                name: 'Penne Arrabbiata',
                category: 'pasta',
                price: 11.99,
                description: 'Spicy tomato sauce with garlic and herbs',
                emoji: '🍝'
            },
            {
                id: 7,
                name: 'Chocolate Cake',
                category: 'dessert',
                price: 6.99,
                description: 'Rich chocolate cake with ganache',
                emoji: '🍰'
            },
            {
                id: 8,
                name: 'Ice Cream Sundae',
                category: 'dessert',
                price: 5.99,
                description: 'Vanilla ice cream with toppings',
                emoji: '🍨'
            },
            {
                id: 9,
                name: 'Cola',
                category: 'drinks',
                price: 2.99,
                description: 'Refreshing cold cola',
                emoji: '🥤'
            },
            {
                id: 10,
                name: 'Fresh Lemonade',
                category: 'drinks',
                price: 3.99,
                description: 'Homemade fresh lemonade',
                emoji: '🍋'
            },
            {
                id: 11,
                name: 'BBQ Pizza',
                category: 'pizza',
                price: 15.99,
                description: 'BBQ sauce, chicken, onions, and cheese',
                emoji: '🍕'
            },
            {
                id: 12,
                name: 'Veggie Burger',
                category: 'burger',
                price: 9.49,
                description: 'Plant-based patty with fresh veggies',
                emoji: '🥗'
            }
        ];

        let cart = [];
        let currentCategory = 'all';

        function renderMenu() {
            const menuGrid = document.getElementById('menuGrid');
            const filteredItems = currentCategory === 'all' 
                ? menuItems 
                : menuItems.filter(item => item.category === currentCategory);

            menuGrid.innerHTML = filteredItems.map(item => `
                <div class="menu-item">
                    <div class="item-image">${item.emoji}</div>
                    <div class="item-details">
                        <div class="item-name">${item.name}</div>
                        <div class="item-description">${item.description}</div>
                        <div class="item-footer">
                            <div class="item-price">$${item.price.toFixed(2)}</div>
                            <button class="add-btn" onclick="addToCart(${item.id})">Add</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderMenu();
        }

        function addToCart(itemId) {
            const item = menuItems.find(i => i.id === itemId);
            const existingItem = cart.find(i => i.id === itemId);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...item, quantity: 1 });
            }

            updateCart();
        }

        function updateQuantity(itemId, change) {
            const item = cart.find(i => i.id === itemId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== itemId);
                }
                updateCart();
            }
        }

        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartSummary = document.getElementById('cartSummary');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p>Your cart is empty</p>
                    </div>
                `;
                cartSummary.style.display = 'none';
                checkoutBtn.disabled = true;
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">$${item.price.toFixed(2)} each</div>
                        </div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span class="quantity">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `).join('');

                const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const deliveryFee = 3.99;
                const total = subtotal + deliveryFee;

                document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
                document.getElementById('deliveryFee').textContent = `$${deliveryFee.toFixed(2)}`;
                document.getElementById('total').textContent = `$${total.toFixed(2)}`;

                cartSummary.style.display = 'block';
                checkoutBtn.disabled = false;
            }

            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
        }

        function scrollToCart() {
            document.getElementById('cartSection').scrollIntoView({ behavior: 'smooth' });
        }

        function checkout() {
            const orderId = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('orderId').textContent = orderId;
            document.getElementById('successModal').classList.add('active');
            
            cart = [];
            updateCart();
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        // Initialize
        renderMenu();
        lucide.createIcons();
    </script>
</body>
</html>
